<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#2f6bd8" />
  <meta name="description" content="확정 공모가 기준 청약 판단 — 진행·예정 공모주를 한눈에" />
  <title>공모주 계산기</title>
  <link rel="manifest" href="/manifest.json" />
  <link rel="icon" href="/icons/favicon.png" />
  <link rel="apple-touch-icon" href="/icons/icon-192.png" />
  <link rel="stylesheet" href="/styles.css" />
</head>
<body>
  <header class="app-header">
    <div class="header-row">
      <h1 class="app-title">공모주 계산기</h1>
      <div class="header-actions">
        <button id="btn-theme" class="icon-btn" type="button" aria-label="다크 모드로 전환">
          <svg class="icon icon-moon" viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M21 12.8A9 9 0 1 1 11.2 3a7 7 0 0 0 9.8 9.8z"/></svg>
          <svg class="icon icon-sun" viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><circle cx="12" cy="12" r="4"/><path d="M12 2v2M12 20v2M4.9 4.9l1.4 1.4M17.7 17.7l1.4 1.4M2 12h2M20 12h2M4.9 19.1l1.4-1.4M17.7 6.3l1.4-1.4"/></svg>
        </button>
        <button id="btn-push" class="icon-btn" type="button" aria-label="알림 구독">
          <svg class="icon" viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M18 8a6 6 0 0 0-12 0c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.7 21a2 2 0 0 1-3.4 0"/></svg>
        </button>
      </div>
    </div>
  </header>

  <div class="controls">
    <div class="segment" id="segment" role="tablist" aria-label="공모 구분">
      <button class="segment-btn active" type="button" data-tab="active" role="tab" aria-selected="true">청약</button>
      <button class="segment-btn" type="button" data-tab="past" role="tab" aria-selected="false">지난 공모</button>
    </div>
    <nav class="filters" aria-label="필터">
      <div class="chips" id="verdict-filters">
        <button class="chip active" type="button" data-filter="all">전체</button>
        <button class="chip" type="button" data-filter="recommend">추천만</button>
      </div>
      <label class="toggle"><input type="checkbox" id="show-spac" /> <span>스팩 포함</span></label>
    </nav>
  </div>

  <main id="list" class="list" aria-live="polite" aria-busy="true">
    <div class="empty">불러오는 중…</div>
  </main>

  <footer class="app-footer">
    <p id="last-updated" class="meta-line">불러오는 중…</p>
    <button id="btn-refresh" class="text-btn" type="button" hidden>새로고침</button>
  </footer>

  <div id="toast" class="toast" role="status" aria-live="polite"></div>

  <script src="/app.js" type="module"></script>
</body>
</html>
